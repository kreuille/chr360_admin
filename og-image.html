<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>OG Image · CHR 360°</title>
<meta name="robots" content="noindex, nofollow">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  html,body{width:1200px;height:630px;overflow:hidden}
  body{
    background:linear-gradient(135deg,#080C1F 0%,#0F1535 50%,#1A0B2E 100%);
    color:#F0F4FF;
    font-family:'DM Sans',sans-serif;
    position:relative;
    width:1200px;
    height:630px;
  }
  .bg-mesh{
    position:absolute;inset:0;
    background:
      radial-gradient(ellipse 50% 40% at 20% 30%,rgba(0,229,255,.15) 0%,transparent 60%),
      radial-gradient(ellipse 40% 35% at 80% 70%,rgba(167,139,250,.18) 0%,transparent 60%);
  }
  .bg-grid{
    position:absolute;inset:0;
    background-image:
      linear-gradient(rgba(255,255,255,.04) 1px,transparent 1px),
      linear-gradient(90deg,rgba(255,255,255,.04) 1px,transparent 1px);
    background-size:60px 60px;
    opacity:0.5;
  }
  .content{
    position:relative;z-index:1;
    padding:60px 72px;
    height:100%;
    display:flex;
    flex-direction:column;
    justify-content:space-between;
  }
  .logo-row{display:flex;align-items:center;gap:14px}
  .logo-dot{width:18px;height:18px;border-radius:50%;background:#00E5FF;box-shadow:0 0 24px #00E5FF}
  .logo-text{font-family:'Syne',sans-serif;font-size:28px;font-weight:800;letter-spacing:.04em}
  .badge{
    display:inline-block;
    padding:6px 14px;
    background:rgba(0,229,255,0.12);
    border:1px solid rgba(0,229,255,0.3);
    color:#00E5FF;
    font-size:13px;
    font-weight:700;
    letter-spacing:.1em;
    text-transform:uppercase;
    border-radius:8px;
    margin-top:14px;
  }
  h1{
    font-family:'Syne',sans-serif;
    font-size:72px;
    font-weight:800;
    line-height:1.05;
    letter-spacing:-0.02em;
    margin-top:32px;
    color:#F0F4FF;
  }
  h1 .cyan{color:#00E5FF}
  h1 .mauve{color:#A78BFA}
  .sub{
    font-size:24px;
    color:#9CA3AF;
    line-height:1.4;
    margin-top:24px;
    max-width:820px;
  }
  .footer-row{
    display:flex;
    justify-content:space-between;
    align-items:flex-end;
  }
  .features{
    display:flex;
    gap:32px;
    font-size:17px;
    color:#D1D5DB;
  }
  .feature{display:flex;align-items:center;gap:8px}
  .feature-ico{
    width:10px;height:10px;
    border-radius:2px;
    background:#00E5FF;
  }
  .price{
    text-align:right;
    font-family:'Syne',sans-serif;
  }
  .price-num{font-size:48px;font-weight:800;color:#00E5FF;line-height:1}
  .price-label{font-size:14px;color:#9CA3AF;margin-top:6px;letter-spacing:.05em}
</style>
</head>
<body>
<div class="bg-mesh"></div>
<div class="bg-grid"></div>

<div class="content">
  <div>
    <div class="logo-row">
      <div class="logo-dot"></div>
      <div class="logo-text">CHR 360°</div>
    </div>
    <div class="badge">Logiciel restaurant Suisse · IA</div>
    <h1>Photo → KPIs en<br><span class="cyan">15 minutes.</span></h1>
    <div class="sub">Plateforme IA tout-en-un pour restaurants suisses : factures automatisées, food cost temps réel, export fiduciaire.</div>
  </div>

  <div class="footer-row">
    <div class="features">
      <div class="feature"><div class="feature-ico"></div>GPT-4o</div>
      <div class="feature"><div class="feature-ico"></div>Bexio · Banana · Sage</div>
      <div class="feature"><div class="feature-ico"></div>8 caisses</div>
      <div class="feature"><div class="feature-ico"></div>nLPD &amp; RGPD</div>
    </div>
    <div class="price">
      <div class="price-num">89 CHF</div>
      <div class="price-label">DÈS · ESSAI 14 J GRATUIT</div>
    </div>
  </div>
</div>
</body>
</html>
